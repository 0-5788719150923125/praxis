# the-point - the default storyboard (Manual mode opens with this).
#
# The brief from ../../tunes/compositions/the-point/video.txt, as DATA: a human eye
# becoming its digital self, coming to life, then a swarm. All fifteen timecoded
# beats are spans below (their [Ns] tags are the brief's timecodes); the entries
# group them by what is on screen, cut on the musical sections. The opening grew
# past the brief: the single eye now gets a real scene (blink, a dilation that
# decays, restless focus pulls), the split is a full MITOSIS entry (tissue membrane,
# stick-slip pull, snap), and the two eyes get a scene of their own before the
# crystallization begins. Every entry is the data-driven `stage` scene - actors from
# the Cast registry, verbs from the Actions registry - and consecutive entries CARRY
# their live actors across the cut (same id = same body), so the eye and the prisms
# continue, never re-created.
#
# Numbers in [lo, hi] pairs are sampled ranges - every instance of this show draws
# its own values from the session seed (cattle, not pets). Times inside a track are
# seconds of its `nominal`; they scale with the entry's hold and the storyboard's
# sensitivity, so compressing the piece is one number, not fifteen edits.
name: the-point
loop: false                 # hold the final swarm frame for the end card
transition: cut
# Nominal times are authored at the brief's 33s scale; the actual song (Beats Able)
# runs 22.88s, so sensitivity 2.0 compresses everything by half: the 42 nominal
# seconds below play in ~21, and the remainder rolls through the `tail:` entries
# (the swarm streaming on) until the loop rolls the arc back to the top.
sensitivity: 2.0
# The timeline clock BREATHES with the song: energetic passages run each scene's
# keyframes up to 25% faster, quiet ones up to 25% slower (zero-mean, endogenous -
# the total length stays anchored). Ambient body motion never speeds up.
elastic: 0.25

defs:
  # The locked, static, forward-facing shot (the brief's guardrail: the camera never
  # moves until the swarm).
  front-camera: {eye: [0, 0, 4.0], look: [0, 0, 0], fov: 48}

  # The calm human gaze: depth tiers with the extremes held longer, small lateral
  # hops, a rare one-eye stray. (This table was baked, differently tuned, into three
  # scene files; now it is one def.)
  gaze-calm:
    tiers:
      - {p: 0.32, dist: [2.2, 4.0], dwell: [3.0, 5.5]}     # near - linger, eyes verge
      - {p: 0.36, dist: [5.0, 11.0], dwell: [2.0, 3.6]}    # mid
      - {p: 0.32, dist: [22, 80], dwell: [3.5, 7.0]}       # far - linger, near-parallel
    lateral: [0.12, 0.45]
    stray: 0.07                                            # the nonlinear deviation

  # The watchful gaze beside the prism: nearer, steadier (from eye_prism).
  gaze-watchful:
    tiers:
      - {p: 0.4, dist: [2.2, 4.0], dwell: [2.2, 4.0]}
      - {p: 0.6, dist: [8.0, 40.0], dwell: [2.0, 3.6]}
    lateral: [0.12, 0.4]

sequence:
  # ---- awaken [0-6s] ---------------------------------------------------------
  # beat 1: from NOTHING, a STANDING ROSE: the stem grows up from below the frame
  # beside the anchor, crests above it, and droops its head over - fruiting the eye
  # at the hanging tip, facing the ground like a wilting bloom. It sheds a petal or
  # two; the eye DETACHES; the freed stem whips back and retreats down; the dropped
  # eye settles onto its anchor and rights itself. Then one slow event: the pupil
  # dilates in a surge and decays away. Nothing else.
  - scene: stage
    behavior: static
    shot: centered
    hold: 6
    camera: {use: front-camera}
    cast:
      # Born HIDDEN: the void is empty until the vine fruits the eye into being.
      - {id: left, kind: eye, at: [0, 0, 0], radius: [0.30, 0.40], hidden: true}
    track:
      nominal: 6
      spans:
        - {from: 0.6, to: 3.4, action: sprout, target: left, ease: linear}
        - {from: 3.4, to: 6.0, action: look, target: left, args: {use: gaze-calm}}
        - from: 3.9                                                                    # the surge...
          to: 4.7
          action: ramp
          target: left
          ease: in
          args: {param: dilate, to: [0.24, 0.34]}
        - from: 4.7                                                                    # ...decays away
          to: 6.0
          action: ramp
          target: left
          ease: out
          args: {param: dilate, to: [0.02, 0.06]}

  # ---- mitosis [6-12s] -------------------------------------------------------
  # beat 2: the eye divides - ONE thing happening, watched head-on. A bud swells
  # off it (volume conserved - the parent deflates), a tissue membrane stretches,
  # thins to strands, and SNAPS: recoil, spatter, and the blank newborn ball rolls
  # its iris in. The verb owns the gaze: the parent stares dead ahead as it labors.
  - scene: stage
    behavior: static
    shot: centered
    hold: 6
    camera: {use: front-camera}
    cast:
      - {id: left, kind: eye, at: [0, 0, 0], radius: [0.30, 0.40]}       # carried in live
      - {id: right, kind: eye, at: [0.62, 0, 0], hidden: true}
    track:
      nominal: 6
      spans:
        - from: 0.8                                                                    # the division
          to: 5.3
          ease: linear                       # the verb shapes its own phases
          action: split
          target: left
          args: {into: right, slots: [[-0.62, 0, 0], [0.62, 0, 0]]}

  # ---- regard [12-17s] -------------------------------------------------------
  # the two eyes, ALIVE together: verging on a shared wandering focus - quiet
  # screen time for the pair before the machines arrive.
  - scene: stage
    behavior: static
    shot: centered
    hold: 5
    camera: {use: front-camera}
    cast:
      - {id: left, kind: eye, at: [-0.62, 0, 0], radius: [0.24, 0.30]}   # carried in live
      - {id: right, kind: eye, at: [0.62, 0, 0], radius: [0.24, 0.30]}   # carried in live
    track:
      nominal: 5
      spans:
        - {from: 0.0, to: 5.0, action: look, target: [left, right], args: {use: gaze-calm}}

  # ---- build [17-23s] --------------------------------------------------------
  # beat 3: the RIGHT eye dissolves and crystallizes into the blue Prism.
  # beat 4: the Prism rotates and looks around on its own; the eye watches.
  # beat 5: the remaining eye trembles faster and faster, light building.
  - scene: stage
    behavior: static
    shot: centered
    hold: 6
    camera: {use: front-camera}
    cast:
      - {id: left, kind: eye, at: [-0.62, 0, 0], radius: [0.24, 0.30]}   # carried in live
      - {id: right, kind: eye, at: [0.62, 0, 0], radius: [0.24, 0.30]}   # carried in live
      - {id: blue, kind: prism, at: [0.62, 0, 0], scale: [0.26, 0.32], hue: 0.6, hidden: true}
    track:
      nominal: 6
      spans:
        - {from: 0.0, to: 6.0, action: look, target: [left, right], args: {use: gaze-watchful}}
        - from: 0.4                          # the freezing-over (the verb owns its phases
          to: 4.6                            # AND the right eye's gaze - it stills first)
          ease: linear
          action: crystallize
          target: right
          args: {into: blue}
        - {from: 4.6, to: 6.0, action: tremble, target: left, ease: in}

  # ---- DROP + groove [23-32s] --------------------------------------------------
  # beat 6: the trembling eye BURSTS into the red Prism ON the drop beat.
  # beat 7: the two Prisms snap into phase-lock, rotating as one.
  # beat 8: the locked pair scans the void in unison.
  # beat 9: the blue breaks sync and wanders; the red holds dead still.
  - scene: stage
    behavior: static
    shot: centered
    hold: 9
    camera: {use: front-camera}
    cast:
      - {id: left, kind: eye, at: [-0.62, 0, 0], radius: [0.24, 0.30]}   # still trembling
      - {id: blue, kind: prism, at: [0.62, 0, 0], hue: 0.6}              # carried in live
      - {id: red, kind: prism, at: [-0.62, 0, 0], scale: [0.26, 0.32], hue: 0.0, hidden: true}
    track:
      nominal: 9
      spans:
        - {from: 0.0, to: 1.0, action: look, target: left, args: {use: gaze-watchful}}
        - {at: 0.0, on: beat, by: 0.8, action: burst, target: red, args: {replaces: left}}  # the DROP
        - {from: 2.7, to: 7.2, action: lock, target: red, args: {to: blue, snap: 0.07}}
        - {at: 7.2, action: desync, target: red}
        - {from: 7.2, to: 9.0, action: hold_still, target: red}

  # ---- counterflow [32-37s] ------------------------------------------------------
  # beat 10: the Prisms take OPPOSITE HIGHWAYS - each on its own lane, cruising
  # against the other, rolling like drills down their roads, passing mid-scene.
  # beat 11: they SPECIALIZE as they drive - blue swells, slows to a glide; red
  # shrinks and quickens to a zip (bias and variance made physical). In the last
  # stretch each pulls a LOOP off its lane - the arc that carries them into the
  # ouroboros, where they become its two counter-winding strands.
  - scene: stage
    behavior: static
    shot: centered
    hold: 5
    camera: {use: front-camera}
    cast:
      # Slots MATCH the drop scene's, so the carried prisms arrive without a jump -
      # the current catches them exactly where they were drifting.
      - {id: blue, kind: prism, at: [0.62, 0, 0], hue: 0.6}              # carried in live
      - {id: red, kind: prism, at: [-0.62, 0, 0], hue: 0.0}              # carried in live
    track:
      nominal: 5
      spans:
        - {from: 0.0, to: 5.0, action: counterflow, target: [blue, red], ease: linear}
        - from: 1.2
          to: 4.0
          action: specialize
          target: blue
          args: {size: [1.45, 1.65], tempo: [0.5, 0.6], pulse: {amp: 0.12, rate: 1.2}}
        - from: 1.2
          to: 4.0
          action: specialize
          target: red
          args: {size: [0.55, 0.65], tempo: [1.6, 2.0], pulse: {amp: 0.06, rate: 6.5}}

  # ---- OUROBOROS [37-42s] --------------------------------------------------------
  # beat 12: 6-7 blue Prisms fly in one at a time and form up - the carried blue,
  # arriving mid-loop from its highway, leads them. Camera may move only from here.
  # beat 13: the formation flies forward along an invisible track.
  # beat 14: the track splits into a double helix - blue and red strands counter-
  # winding, weaving past each other. The carried RED, which drove off down the
  # opposite highway, returns as the red strand's lead: the loop closes on itself.
  # beat 15: the swarm banks to ONE side and leaps to the other strand, then rides
  # on - room for the date/logo card.
  - scene: stage
    behavior: static
    shot: centered
    hold: 5
    camera: {eye: [0, 0, -2.6], look: [0, 0, 5], fov: 56}
    cast:
      - id: swarm
        kind: swarm
        at: [0, 0, 0]
        count: 7
        hue: 0.6
        hue_red: 0.0
        lead: blue
        lead_red: red
    track:
      nominal: 5
      spans:
        - {from: 0.0, to: 2.0, action: gather, target: swarm, ease: linear}            # [28-30s]
        - {from: 1.4, to: 3.0, action: fly, target: swarm, sustain: true}              # [30s-] never parks
        - {from: 3.0, to: 4.0, action: helix_split, target: swarm}                     # [31-32s]
        - {from: 4.0, to: 4.7, action: lane_jump, target: swarm}                       # [32-33s]

# After the sequence ends (loop: false), the Director cycles this instead of
# freezing the last frame. Deliberately SIMPLE: after the swell's jump the swarm
# just keeps spiraling along its chosen track into the distance under the end card
# - no weaving, no new events - until the loop rolls the arc back to the top. The
# carried `swarm` id continues wholesale, so the cycle boundaries are invisible.
tail:
  - scene: stage
    behavior: static
    shot: centered
    hold: 6
    camera: {eye: [0, 0, -2.6], look: [0, 0, 5], fov: 56}
    cast:
      - {id: swarm, kind: swarm}
    track:
      nominal: 6
      spans:
        - {from: 0.0, to: 0.4, action: fly, target: swarm, ease: out, sustain: true}
