services:
  agent:
    build:
      context: .
      args:
        BASE_IMAGE: ubuntu:24.04
    stdin_open: true
    tty: true
    ipc: host
    working_dir: /workspace
    command: ["./launch"]
    volumes:
      - .:/workspace:rw
      - venv:/workspace/.venv
      - cache:/root/.cache
    ports:
      - "2100:2100"
      - "29500:29500"
    env_file:
      - path: ./.env
        required: false
    environment:
      PYTHONUNBUFFERED: 1
      DEBIAN_FRONTEND: noninteractive

volumes:
  venv:
  cache:
