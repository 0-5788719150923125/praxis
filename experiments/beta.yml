# Beta blueprint configuration
# These defaults are applied when using --beta flag

seed: 42
device: cpu
batch_size: 1
target_batch_size: 64
block_size: 256
infer_context: 512
depth: 6
num_layers: 2
vocab_size: 4096
hidden_size: 96
embed_size: 64
ffn_type: arc
attention_type: arc
window_size: 64
num_heads: 6
num_queries: 1
encoder_type: byte_latent_conv_small
tokenizer_type: byte_level
decoder_type: sequential
activation: serpent
norm_type: sandwich
halting_type: kl
strategy: naive
optimizer_wrappers: [schedule_free]
train_datasets: [base, chat]
data_path: ["/opt/platformer"]
sampler_mode: uniform
task_weights: difficulty_bias_pretrain
loss_func: cross_entropy
head_type: prismatic
encoding: arc
tie_weights: true
# Bring the remote-expert pool online (praxis.orchestration). The "swarm"
# profile spawns a Node sidecar of 4 tiny experts at boot, joinable from the web
# Stage tab, and votes through them (CALM-style expert vote, matching calm's
# patch-vote decoding) - reporting live capacity + a growing remote_layers count
# on both dashboards. Detached, layer-wise (Mono-Forward) updates, so a slow peer
# never blocks training.
orchestration_type: swarm
