  Figure~\ref{fig:density}, reorganized as this head reads it. \textbf{Top:}
  the sequence, its field drawn in frequencies. The spaces stay in the
  lattice as teeth - byte-wide white cells holding no content, pure entropy:
  the boundaries byte-latent patching cuts on. \textbf{Below:} successive
  MTP steps. A step advances the stream $K$ bytes and re-derives the full
  sequence from its new head, so each row is the whole sequence again, slid
  $K$ left - never a $K$-byte fragment (dashed cells: not yet written).
  Density is per patch, heaviest at a patch's first byte and decaying
  through its predictable tail all the way to white - every patch keeps a
  white stretch where genuinely little information lives - and the
  characters melt out of their boxes the same way, pooling toward each
  patch's head, spilling over the cell walls, leaving the right of every
  window sparse - and they crowd further left with every step, each patch
  compressing toward its own head until the last row holds each patch's
  bytes stacked on a single position. Each step runs denser than the last as context
  accumulates, and every row darkens along $T$, because later positions
  compress the full sequence so far, however many tokens remain to
  attend to; the final row runs densest of all, its white regions
  narrowest - information densifying as it twists toward the final
  representation, $t{+}4K$. The outlined band is a fixed $K$-wide window: the
  stream slides through it, one column of $K$ per step - in standard
  byte-latent decoding it would advance one cell at a time. The wiggly
  strands run from the window's last content byte, at every earlier step, to
  the first token of the final sequence - the one they all resolve into, so
  it draws no strand of its own: every window is connected to both the
  future and the past of every sequence - phase-locking, every feature
  contributing to every representation. The locking runs down the depth axis too - the
  vertical wave at the left is the same field read across the steps,
  humming at the trunk, chirping into $t{+}4K$. One byte still traces a diagonal through the
  succession of views, $K$ cells left per step, re-predicted and bolstered
  or refuted at every pass. Schematic (drawn at $K{=}4$; the mechanism is
  $K$-generic), not measured; the measured object is the per-depth
  acceptance profile.}
