# Enables when a Titans-style neural memory profile is active (--memory-type
# != none). Describes the in-house deviation - detached, layer-wise local
# learning, fully continuous - and places it on the paper's bias/variance
# axes: by structure, pure bias.
section: harmonic
order: 55
requires:
  memory_type: ["mal*", "mag*"]
body: >
  \subsection{A memory that is pure bias by construction}

  The framework also carries a Titans-style neural
  memory~\cite{behrouz2024titans} - a small network whose weights are updated
  online, during the forward pass, by gradient descent on a surprise loss:
  how badly it reconstructs a value vector from its key. Our variant deviates
  from the baseline in a way that matters to this paper's axes. The update is
  fully detached and layer-wise local, in the Mono-Forward
  sense~\cite{monoforward2025}, itself a descendant of Forward-Forward
  layer-local learning~\cite{hinton2022forwardforward}: no gradient from the
  task ever reaches the
  memory's own learning rule, which is a fixed, scale-invariant step on local
  surprise. The module is also fully continuous, end to end. It
  never sees a token, a position, or a logit - continuous vectors arrive,
  shifted continuous targets leave - so it cannot know what its inputs mean
  or what its outputs will be used for; in that respect it shares a direction
  with fully-differentiable computation efforts such as
  neurallambda~\cite{neurallambda2024}, which push symbolic machinery into
  the continuous regime rather than the reverse. This is a zero-knowledge
  discipline~\cite{gmr1989} turned inward: the module does verifiable local
  work - it provably reduces its own surprise - on a witness whose semantics
  are structurally withheld from it, the same expose-the-output,
  hide-the-perturbable-witness principle that makes the rest of the system
  robust to its own observers.

  What that surprise targets is itself a coordinate. In the predictive
  variant the memory is trained to forecast the \emph{next} latent rather
  than reconstruct the current value, which - following Next-Latent
  Prediction~\cite{nextlat2025} - shapes the stored state into a
  \emph{belief state}: a sufficient statistic for the future rather than a
  lagged echo of the residual it is added to. The distinction matters
  here, because an echo of the present is redundant and the model learns to
  route around it, while a forecast of the next state is the input-conditional
  correction the residual does not already carry - which is why a predictive
  target keeps the memory contributing real signal where an auto-associative
  one decays toward none.

  On the bias/variance geometry of this paper, that design pins the module to
  one axis. Its learning rule is the same for every input, every layer, every
  run - a population-average procedure with no input-conditional pathway into
  how it learns; what varies with the input is only the content written
  through that fixed rule. It is, by structure, pure bias: the standing
  rhythm of the architecture, deviation-free where the prismatic head's
  variance arm is deviation-only. That a useful long-term memory can sit
  entirely on the bias axis - blind, local, continuous, and still doing real work
  - is itself a small piece of evidence for treating the two axes as
  separable machinery rather than a single dial.
