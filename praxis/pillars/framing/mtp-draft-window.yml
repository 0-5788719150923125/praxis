# The shared body of the multi-token section: the "short curve" reading and
# the fox figure. Gated on ANY mtp_type (the intro fragment mtp-draft.yml
# opens the subsection; a per-mechanism paragraph at order 14 sits between).
# The figure reading (user-corrected several times, keep it): depth k
# predicts t+k for EVERY t (training), and at inference the stack advances K
# per step - each row is a successive MTP STEP re-deriving the full sequence,
# slid K left, never a fragment. Spaces stay as byte-wide white teeth (pure
# entropy, the patch boundaries); density is per-patch (heavy at the patch
# head, decaying through the tail) and deepens per step; a fixed K-wide
# window shows the stream sliding through, K per step; wiggly strands tie
# every EARLIER view to the first token of the final one (phase-locking - the
# final row is what they resolve into, so it draws no strand). Claims stay
# inside what the run measures (per-depth draft acceptance, plus each
# mechanism's own depth-distinctness readout), with the falsifier named -
# the paper's standard. The prose is K-generic; the figure is an explicit
# K=4 schematic.
section: harmonic
order: 15
requires:
  mtp_type: "*"
body: >
  The reason this belongs in the present section is what it does to the unit
  of prediction. The received picture of Figure~\ref{fig:density}'s top panel
  lands one position-local loss everywhere - the uniform-density assumption
  restated as supervision. With $K$ losses read off one state, the objective
  couples the window: the loss at the window's tip propagates backward into
  the representation at $t$, and what the head emits is a short curve over
  $K$ future positions rather than $K$ independent point estimates. And the
  draft depths are not $K$-byte gadgets bolted to the tip. Depth $k$
  predicts position $t{+}k$ for every $t$ at once, so each depth's output is
  the full sequence again, shifted by $k$: the $K$ slots are $K$ near-copies
  of the sequence, sharing representation by construction - all of them read
  the same trunk, and adjacent depths share most of their transform - and
  distinguished chiefly by their shift. At inference tempo the stack moves
  $K$ at a time: each step commits a $K$-wide column and re-derives the
  whole view from its new head, and a single byte still traces a diagonal
  through the succession of views - re-predicted at every pass, each pass
  bolstering or refuting the one before it. The hypothesis, stated plainly:
  this is multi-scale timeseries modeling - full-sequence views at $K$-byte
  strides, heavily shared, each depth free to settle anywhere between the
  window's granularity and the sequence's span, in exactly the sense the
  unbounded-latent program is continuous~\cite{calm2025} - and the per-depth
  distinctness the head preserves is the room each depth has to choose
  its scale. And every view stays tied to the head - the first token, the
  hum the whole corpus shares - so the depths are phase-locked: every
  feature contributes to every representation.

  Figure~\ref{fig:mtp-window} redraws the fox strip as this head reads it -
  not $K$-byte fragments cut from the sequence but the whole sequence
  re-derived step after step, slid $K$ at a time - and the strip now keeps
  its spaces: byte-latent patching cuts on them, so each space stays in the
  lattice as a tooth, a byte-wide cell holding no content, pure entropy.
  Density is drawn per patch - heaviest at a patch's first byte, where the
  information arrives, decaying through its predictable tail - the
  characters float leftward off their cells the way the density figure
  floats them, and each step runs denser than the last as context
  accumulates. The reading closes
  with its own instrument: if each step is a genuine re-approximation,
  density inside the window is once again a shape rather than a constant,
  and that shape is already measured - the per-depth draft-acceptance
  profile, the expected accepted-run length that sets the achievable
  speedup, is the within-window analogue of the density curve, logged per
  head. The failure mode is equally concrete: a flat acceptance profile
  alongside a collapsed depth-distinctness readout
  (the transforms settled into one function; each mechanism logs its own)
  would mean the depths bought nothing that independent heads lacked, and
  both series are on the dashboard, so the claim arrives with its
  refutation instrumented.

