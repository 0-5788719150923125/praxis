abstract: 'Do you exist in other people''s realities the same way you exist in your
  own? It is a question the field tends to defer: the reflex is to hand the burden
  of proof back to whoever raised it, as if demanding evidence were the neutral
  posture and the asking were the indulgence. That reflex is not neutral. It is
  a prior, learned so early it passes for common sense, and priors are precisely
  the subject of this paper. The dominant program in machine learning rests on one
  of them: that a single architecture, given enough parameters, data, and compute,
  can reach anything worth learning - that the architecture itself is neutral ground.
  We argue instead that what a model can learn is set less by how large it is than
  by the geometry of its representation - the shape of the space its weights are
  allowed to occupy. We make that concrete with two components of the Praxis framework~\cite{praxis2025}:
  a harmonic head that writes a learned standing wave over its features, and \paperFramingAbstract
  In both, the classical bias-variance tradeoff stops being a single dial. A static,
  population-average rhythm (the spectrum the field phase-locks to) is pure bias;
  an input-conditional modulation of that rhythm is structured variance; and because
  the two live on orthogonal axes of a harmonic latent space, they can be lowered
  together rather than traded against each other. This reframing motivates a central
  conjecture: consensus modeling - learning the mean of a corpus - scales linearly
  in the patterns it must express, while harmonic modeling, which composes patterns
  by interference, scales logarithmically, because $K$ frequency components address
  exponentially many configurations. The framework exists so that the reader can
  test it.'
conclusion: 'We began with scale and ended with geometry. The patterns a model can
  learn are set by the shape of the space its weights may occupy, and a harmonic
  latent space reshapes the oldest tradeoff in the field: bias becomes a static,
  population-average spectrum, variance becomes an input-conditional modulation,
  and because they live on orthogonal axes they can be lowered together. From that
  decoupling follows a conjecture stated plainly - that learning the mean costs
  linearly while composing by interference costs logarithmically - and a framework
  built to test it rather than to argue it. And from that, in turn, follows the
  harder claim: that tractability is not a fixed property of a problem but a relation
  between a problem and the observer solving it. The same instance is exponential
  to one architecture and nearly free to another, so $P$ and $NP$ are better read
  as a spectrum that the choice of representation indexes than as a wall every solver
  meets in the same place. The speculative figure is gone; the conjectures that
  replace it are falsifiable. What remains is praxis: the answer manifests through
  direct experimentation, and what you choose to attend to determines what we find
  next.'
introduction: 'The dominant recipe for capability is scale. Fix a transformer~\cite{vaswani2017attention},
  then grow it: more parameters, more tokens, more compute, with returns described
  by smooth scaling laws~\cite{kaplan2020}. The recipe works, but it assumes the
  architecture itself imposes no ceiling on which patterns gradient descent can
  find - that everything worth learning is reachable from any sufficiently large
  model. This paper questions that assumption and offers a concrete alternative:
  that the \textit{geometry} a model is allowed to represent, not its size, determines
  the patterns accessible to it during finite training.


  To make the claim precise we need a vocabulary for ``geometry,'''' and the cleanest
  one available is the oldest tradeoff in statistics. A model that minimizes error
  by collapsing toward the average of its training data has high bias and low variance;
  a model that chases the particulars of each example has low bias and high variance.
  Classically these trade off along a single line: you choose a point on it. Our
  first contribution is to show that in a \textit{continuous, harmonic} latent space
  this is no longer true. Bias and variance become separate coordinates, and a model
  can move in one without paying in the other.


  We ground this in mechanisms that already run in Praxis, not in metaphor. The
  harmonic head (Section~\ref{sec:manifold}) builds a two-dimensional standing wave
  over (position, feature) from a learned grid of frequency amplitudes with irrational,
  frozen phases. A \textit{static} amplitude grid produces the same field for every
  input: it is the corpus-average rhythm, maximum bias, a flat-by-construction prior.
  Making those amplitudes depend on the input adds \textit{structured} variance
  - deviation that still respects the learned harmonic constraints. The CALM codec
  (Section~\ref{sec:harmonic}) shows the same physics from the other side: a continuous-latent
  autoregressor that reconstructs sequences near-perfectly by phase-locking its
  latent features to a dominant rhythm. From these two we draw a scaling conjecture
  (Section~\ref{sec:scaling}): the mean costs linearly, interference costs logarithmically.


  This paper therefore contributes: (1) a reframing of bias and variance as orthogonal
  axes of a harmonic latent space, grounded in a running implementation and its
  measured diagnostics; (2) a conjecture that consensus modeling scales linearly
  while harmonic modeling scales logarithmically, stated honestly as a conjecture;
  (3) the Praxis framework for testing it; and (4) a candid account of what is measured,
  what is conjectured, and what remains philosophy.'
