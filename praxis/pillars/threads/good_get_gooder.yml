title: The Good Get Gooder Theorem
subtitle: Stochastic Voting Converges to Pretty Good
pillars:
- runs
- evolution
abstract: 'Very large transformers, stochastically sampled through a voting system,
  converge - not to fantastic, but to pretty good. The vote washes out the tails
  and lands on the mean of the corpus, and the mean turns out to be good enough
  to build pretty much anything, in linear time. We name this plainly: the good
  get gooder, and then they stop. On the clock face of the latent space, variance
  lives in one quadrant - the 25\% where input-conditional structure can still swing
  the vote - while bias owns the other 75\%, the standing consensus every sample
  is pulled toward. This paper asks what that partition costs: what "pretty good"
  can and cannot build, and whether the 25\% can be widened without breaking the
  convergence that makes the system dependable.'
theory: '\section{The Good Get Gooder Theorem}


  Informally: a sufficiently large model sampled through a vote converges to the
  corpus mean at linear cost, and the mean is pretty good. The formal work this
  stub owes: define the vote (the patch-vote decoder is the house instance), bound
  its variance contraction, and locate the 75/25 bias/variance partition on the
  measured clock face of the latent space - the quadrant geometry the harmonic snake
  card already draws.


  % TODO(spine stub): the theorem statement, the patch-vote instance,

  % and what widening the variance quadrant trades against convergence.'
conclusion: 'We began with a vote and ended with a mean. Sampled wide enough, a
  large transformer''s stochastic ensemble converges to pretty good - never fantastic,
  never terrible, and dependably buildable-with in linear time. The 75\% of the
  clock face that bias owns is not a failure of the system; it is the system, the
  consensus that makes the vote land anywhere at all. The open question this stub
  leaves for the full treatment: whether the variance quadrant can be widened -
  more of the face given to input-conditional swing - without forfeiting the convergence
  that makes pretty good a guarantee rather than a habit.'
introduction: 'The claim is almost embarrassing to state: sample a large enough
  model through a wide enough vote and you reliably get the mean of what it learned
  - and the mean is pretty good. What keeps the claim from being empty is its geometry.
  On the clock face of the latent space the consensus owns three quadrants; input-conditional
  swing - the part of the vote a particular prompt can actually move - lives in
  the fourth. That partition is measurable, it is the price of dependability, and
  this paper is the start of taking it seriously: when is pretty good enough, what
  does it cost to ask for better, and where does the linear time go.'
