services:
  agent:
    build: .
    runtime: nvidia
    stdin_open: true
    tty: true
    ipc: host
    working_dir: /workspace/praxis
    command: ["./launch"]
    volumes:
      # The repo nests one level deep with its parent mounted read-only above
      # it, so relative sibling paths in experiment configs (data_path:
      # "../platformer") resolve in-container to the same host directory they
      # name outside it. Mounting the repo at /workspace itself made
      # "../platformer" resolve to an empty /platformer at container root.
      - ..:/workspace:ro
      - .:/workspace/praxis:rw
      # Fresh volume name: the old "venv" volume baked /workspace/.venv into
      # its shebangs/activate and breaks at the new path.
      - venv-praxis:/workspace/praxis/.venv
      - cache:/home/dev/.cache
    ports:
      - "${PRAXIS_PORT:-2100}:${PRAXIS_PORT:-2100}"
      - "${PRAXIS_MASTER_PORT:-29500}:${PRAXIS_MASTER_PORT:-29500}"
    env_file:
      - path: ./.env
        required: false
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      PYTHONUNBUFFERED: 1
      DEBIAN_FRONTEND: noninteractive
      # Forwarded from the host launch so the container can re-exec as the host
      # user (default 0 = stay root, preserving old behavior).
      HOST_UID: ${HOST_UID:-0}
      HOST_GID: ${HOST_GID:-0}

volumes:
  venv-praxis:
  cache:
